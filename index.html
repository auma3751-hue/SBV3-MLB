<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBV3-MLB</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    text-align:center;
    border:3px solid #00bfff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px #00bfff;
}

h1{
    color:white;
    font-size:45px;
    text-shadow:0 0 10px white,0 0 20px cyan;
    margin-bottom:30px;
}

.join{
    display:inline-block;
    padding:15px 40px;
    font-size:22px;
    color:white;
    text-decoration:none;
    border:2px solid #00bfff;
    border-radius:10px;
    box-shadow:0 0 15px #00bfff;
    transition:.3s;
}

.join:hover{
    background:#00bfff;
    color:black;
    box-shadow:0 0 30px #00bfff;
}
</style>
</head>

<body>

<div class="box">
    <h1>SBV3-MLB</h1>

    <a class="join" href="https://discord.gg/GU9Kav9hq">
        Join SERVER
    </a>
</div>

</body>
</html>
